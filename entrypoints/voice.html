<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Floq Voice</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:system-ui,sans-serif;background:#fff;width:360px;height:280px;display:flex;flex-direction:column;align-items:center;padding:24px;overflow:hidden}
  h2{font-size:14px;font-weight:700;color:#2563eb;letter-spacing:2px;margin-bottom:4px}
  .status{font-size:12px;color:#94a3b8;margin-bottom:16px}
  .status.active{color:#dc2626}
  .mic{width:64px;height:64px;border-radius:50%;border:3px solid #e2e8f0;background:#f8fafc;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;transition:all .2s;margin-bottom:16px}
  .mic:hover{border-color:#2563eb}
  .mic.recording{border-color:#dc2626;background:#fef2f2;animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.2)}50%{box-shadow:0 0 0 12px rgba(220,38,38,0)}}
  .transcript{width:100%;flex:1;padding:8px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;font-family:inherit;resize:none;outline:none;color:#1a202c}
  .transcript:focus{border-color:#2563eb}
  .done{width:100%;padding:10px;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px}
  .done:hover{background:#1d4ed8}
</style>
</head>
<body>
  <h2>FLOQ</h2>
  <div class="status" id="status">Tap the mic to start</div>
  <div class="mic" id="mic" onclick="toggle()">🎙</div>
  <textarea class="transcript" id="transcript" placeholder="Your words appear here..."></textarea>
  <button class="done" onclick="send()">Done — Send to Sidebar</button>

<script>
  let active = false, recognition = null, finalText = '';

  function toggle() {
    if (active) stop(); else start();
  }

  function start() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { document.getElementById('status').textContent = 'Voice not supported'; return; }

    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';
    finalText = '';

    recognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalText += e.results[i][0].transcript + ' ';
        else interim += e.results[i][0].transcript;
      }
      document.getElementById('transcript').value = finalText + interim;
    };
    recognition.onend = () => { if (active) try { recognition.start(); } catch(e) {} };
    recognition.onerror = (e) => {
      if (e.error !== 'no-speech') document.getElementById('status').textContent = 'Error: ' + e.error;
    };

    recognition.start();
    active = true;
    document.getElementById('mic').classList.add('recording');
    document.getElementById('status').textContent = 'Listening...';
    document.getElementById('status').classList.add('active');
  }

  function stop() {
    active = false;
    if (recognition) { recognition.onend = null; try { recognition.stop(); } catch(e) {} }
    document.getElementById('mic').classList.remove('recording');
    document.getElementById('status').textContent = 'Tap Done to send';
    document.getElementById('status').classList.remove('active');
  }

  function send() {
    const text = document.getElementById('transcript').value.trim();
    if (text) {
      chrome.storage.local.set({ oper8er_voice: text, oper8er_voice_time: Date.now() });
    }
    window.close();
  }

  // Don't auto-start — Chrome requires user gesture for mic access
  document.getElementById('status').textContent = 'Tap the mic to start recording';
</script>
</body>
</html>
